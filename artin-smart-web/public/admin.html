<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理后台 - ArtinSmart</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body class="bg-gray-100 min-h-screen">
    <!-- Header -->
    <header class="bg-white shadow-sm">
        <div class="max-w-7xl mx-auto px-4 py-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <a href="/" class="text-xl font-bold text-blue-600">ArtinSmart</a>
                <span class="text-gray-400">|</span>
                <span class="text-gray-700 font-medium">管理后台</span>
            </div>
            <div class="flex items-center gap-4">
                <span class="text-sm text-gray-600">管理员</span>
                <a href="/" class="text-sm text-gray-500 hover:text-gray-700">返回首页</a>
            </div>
        </div>
    </header>

    <div class="max-w-7xl mx-auto px-4 py-6">
        <!-- Stats -->
        <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-6">
            <div class="bg-white rounded-xl shadow-sm p-6 border-l-4 border-blue-500">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500">总用户</p>
                        <p class="text-3xl font-bold" id="stat-users">-</p>
                    </div>
                    <div class="w-12 h-12 bg-blue-100 rounded-full flex items-center justify-center">
                        <i class="fas fa-users text-blue-600 text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6 border-l-4 border-green-500">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500">活跃用户</p>
                        <p class="text-3xl font-bold" id="stat-active">-</p>
                    </div>
                    <div class="w-12 h-12 bg-green-100 rounded-full flex items-center justify-center">
                        <i class="fas fa-user-check text-green-600 text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6 border-l-4 border-purple-500">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500">今日新增</p>
                        <p class="text-3xl font-bold" id="stat-today">-</p>
                    </div>
                    <div class="w-12 h-12 bg-purple-100 rounded-full flex items-center justify-center">
                        <i class="fas fa-user-plus text-purple-600 text-xl"></i>
                    </div>
                </div>
            </div>
            <div class="bg-white rounded-xl shadow-sm p-6 border-l-4 border-orange-500">
                <div class="flex items-center justify-between">
                    <div>
                        <p class="text-sm text-gray-500">API 调用</p>
                        <p class="text-3xl font-bold" id="stat-calls">-</p>
                    </div>
                    <div class="w-12 h-12 bg-orange-100 rounded-full flex items-center justify-center">
                        <i class="fas fa-bolt text-orange-600 text-xl"></i>
                    </div>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
            <!-- Users List -->
            <div class="lg:col-span-2 bg-white rounded-xl shadow-sm p-6">
                <div class="flex justify-between items-center mb-4">
                    <h2 class="text-lg font-semibold">
                        <i class="fas fa-users text-blue-600 mr-2"></i>用户列表
                    </h2>
                    <input type="text" id="search-user" placeholder="搜索用户..." 
                        class="px-3 py-1 border rounded-lg text-sm"
                        onkeyup="filterUsers()">
                </div>
                
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead>
                            <tr class="border-b">
                                <th class="text-left py-2">ID</th>
                                <th class="text-left py-2">邮箱/手机</th>
                                <th class="text-right py-2">余额</th>
                                <th class="text-right py-2">消费</th>
                                <th class="text-center py-2">状态</th>
                                <th class="text-center py-2">操作</th>
                            </tr>
                        </thead>
                        <tbody id="users-table">
                            <tr>
                                <td colspan="6" class="text-center py-8 text-gray-500">加载中...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <div class="flex justify-between items-center mt-4">
                    <button onclick="prevPage()" class="px-3 py-1 border rounded hover:bg-gray-50" id="prev-btn">上一页</button>
                    <span class="text-sm text-gray-500" id="page-info">第 1 页</span>
                    <button onclick="nextPage()" class="px-3 py-1 border rounded hover:bg-gray-50" id="next-btn">下一页</button>
                </div>
            </div>

            <!-- Quick Actions -->
            <div>
                <div class="bg-white rounded-xl shadow-sm p-6 mb-6">
                    <h2 class="text-lg font-semibold mb-4">
                        <i class="fas fa-bolt text-orange-600 mr-2"></i>快捷操作
                    </h2>
                    <div class="space-y-3">
                        <button onclick="showAddUserModal()" class="w-full py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">
                            <i class="fas fa-plus mr-2"></i>添加用户
                        </button>
                        <button onclick="refreshData()" class="w-full py-2 border border-gray-300 rounded-lg hover:bg-gray-50">
                            <i class="fas fa-sync mr-2"></i>刷新数据
                        </button>
                    </div>
                </div>

                <!-- Usage Chart -->
                <div class="bg-white rounded-xl shadow-sm p-6">
                    <h2 class="text-lg font-semibold mb-4">
                        <i class="fas fa-chart-line text-green-600 mr-2"></i>最近7天调用量
                    </h2>
                    <canvas id="usageChart" height="200"></canvas>
                </div>
            </div>
        </div>
    </div>

    <!-- Add User Modal -->
    <div id="add-user-modal" class="fixed inset-0 bg-black/50 hidden items-center justify-center z-50">
        <div class="bg-white rounded-xl shadow-xl max-w-md w-full mx-4 p-6">
            <h3 class="text-xl font-bold mb-4">添加用户</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">邮箱</label>
                    <input type="email" id="new-email" class="w-full px-4 py-2 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">手机号</label>
                    <input type="tel" id="new-phone" class="w-full px-4 py-2 border rounded-lg">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">初始余额</label>
                    <input type="number" id="new-credits" value="5" class="w-full px-4 py-2 border rounded-lg">
                </div>
            </div>
            <div class="flex gap-3 mt-6">
                <button onclick="closeModal()" class="flex-1 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">取消</button>
                <button onclick="addUser()" class="flex-1 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700">添加</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = 'https://api.artinsmart.cn';
        const ADMIN_KEY = 'artin-admin-secret-key-2026';
        let currentPage = 1;
        let allUsers = [];
        let chart = null;

        // Init
        loadStats();
        loadUsers();
        loadUsageChart();

        function loadStats() {
            fetch(API_BASE + '/api/admin/stats?api_key=' + ADMIN_KEY)
                .then(r => r.json())
                .then(data => {
                    document.getElementById('stat-users').textContent = data.total_users || 0;
                    document.getElementById('stat-active').textContent = data.active_users || 0;
                    document.getElementById('stat-today').textContent = data.new_today || 0;
                })
                .catch(() => {
                    document.getElementById('stat-users').textContent = '0';
                    document.getElementById('stat-active').textContent = '0';
                    document.getElementById('stat-today').textContent = '0';
                });
        }

        function loadUsers() {
            fetch(API_BASE + '/api/admin/users?api_key=' + ADMIN_KEY + '&page=' + currentPage + '&page_size=20')
                .then(r => r.json())
                .then(data => {
                    allUsers = data.users || [];
                    renderUsers();
                })
                .catch(() => {
                    document.getElementById('users-table').innerHTML = '<tr><td colspan="6" class="text-center py-8 text-red-500">加载失败</td></tr>';
                });
        }

        function renderUsers() {
            const tbody = document.getElementById('users-table');
            if (allUsers.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-gray-500">暂无用户</td></tr>';
                return;
            }
            
            tbody.innerHTML = allUsers.map(u => `
                <tr class="border-b hover:bg-gray-50">
                    <td class="py-2">${u.id}</td>
                    <td class="py-2">
                        ${u.email || '-'} ${u.phone ? '<br><span class="text-gray-400 text-xs">' + u.phone + '</span>' : ''}
                    </td>
                    <td class="py-2 text-right">¥${u.credits?.toFixed(2) || '0.00'}</td>
                    <td class="py-2 text-right">¥${u.total_spent?.toFixed(2) || '0.00'}</td>
                    <td class="py-2 text-center">
                        <span class="px-2 py-1 rounded text-xs ${u.is_active ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}">
                            ${u.is_active ? '正常' : '禁用'}
                        </span>
                    </td>
                    <td class="py-2 text-center">
                        <button onclick="toggleUser(${u.id}, ${!u.is_active})" class="text-xs ${u.is_active ? 'text-red-600' : 'text-green-600'}">
                            ${u.is_active ? '禁用' : '启用'}
                        </button>
                    </td>
                </tr>
            `).join('');
            
            document.getElementById('page-info').textContent = '第 ' + currentPage + ' 页';
        }

        function loadUsageChart() {
            fetch(API_BASE + '/api/admin/usage-chart?api_key=' + ADMIN_KEY)
                .then(r => r.json())
                .then(data => {
                    const ctx = document.getElementById('usageChart').getContext('2d');
                    chart = new Chart(ctx, {
                        type: 'bar',
                        data: {
                            labels: data.dates || [],
                            datasets: [{
                                label: '调用次数',
                                data: data.counts || [],
                                backgroundColor: '#3b82f6',
                                borderRadius: 4
                            }]
                        },
                        options: {
                            responsive: true,
                            plugins: { legend: { display: false } },
                            scales: {
                                y: { beginAtZero: true }
                            }
                        }
                    });
                })
                .catch(() => {});
        }

        function filterUsers() {
            const keyword = document.getElementById('search-user').value.toLowerCase();
            const filtered = allUsers.filter(u => 
                (u.email && u.email.toLowerCase().includes(keyword)) ||
                (u.phone && u.phone.includes(keyword))
            );
            const tbody = document.getElementById('users-table');
            if (filtered.length === 0) {
                tbody.innerHTML = '<tr><td colspan="6" class="text-center py-8 text-gray-500">无匹配用户</td></tr>';
            } else {
                // Temporarily show filtered
                allUsers = filtered;
                renderUsers();
            }
        }

        function prevPage() {
            if (currentPage > 1) {
                currentPage--;
                loadUsers();
            }
        }

        function nextPage() {
            currentPage++;
            loadUsers();
        }

        function refreshData() {
            loadStats();
            loadUsers();
            loadUsageChart();
        }

        function showAddUserModal() {
            document.getElementById('add-user-modal').classList.remove('hidden');
            document.getElementById('add-user-modal').classList.add('flex');
        }

        function closeModal() {
            document.getElementById('add-user-modal').classList.add('hidden');
            document.getElementById('add-user-modal').classList.remove('flex');
        }

        function addUser() {
            const email = document.getElementById('new-email').value;
            const phone = document.getElementById('new-phone').value;
            const credits = parseFloat(document.getElementById('new-credits').value) || 5;
            
            if (!email && !phone) {
                alert('邮箱或手机号必填');
                return;
            }

            fetch(API_BASE + '/api/admin/user?api_key=' + ADMIN_KEY, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, phone, credits })
            })
            .then(r => r.json())
            .then(data => {
                if (data.id) {
                    alert('用户添加成功');
                    closeModal();
                    refreshData();
                } else {
                    alert(data.detail || '添加失败');
                }
            })
            .catch(() => alert('添加失败'));
        }

        function toggleUser(userId, enable) {
            if (!confirm(enable ? '确定启用该用户？' : '确定禁用该用户？')) return;
            
            fetch(API_BASE + '/api/admin/user/' + userId + '?api_key=' + ADMIN_KEY, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ is_active: enable })
            })
            .then(r => r.json())
            .then(data => {
                if (data.success) {
                    refreshData();
                } else {
                    showMessage(data.detail || '操作失败', 'error');
                }
            })
            .catch(() => alert('操作失败'));
        }
    </script>

    <footer class="bg-gray-100 py-4 mt-8">
        <div class="max-w-7xl mx-auto px-4 text-center text-xs text-gray-500">
            <p>京ICP备2026011194号</p>
        </div>
    </footer>
</body>
</html>
